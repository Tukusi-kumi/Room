
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未知の部屋</title>
    <style>
        body {
            background-color: #000000;
            color: #00cc00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #00cc00;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: clamp(20px, 5vw, 28px);
            text-shadow: 0 0 8px #00cc00;
            margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .post {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #00cc00;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .post:hover {
            box-shadow: 0 0 10px rgba(0, 204, 0, 0.3);
        }
        
        .post h1 {
            font-size: clamp(16px, 4vw, 18px);
            color: #00ff00;
            margin-top: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .post h1:hover {
            text-shadow: 0 0 5px #00cc00;
        }
        
        .post h1 a {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 5px 0;
        }
        
        .post-meta {
            font-size: clamp(11px, 3vw, 12px);
            color: #009900;
            margin-bottom: 10px;
        }
        
        .post-content {
            font-size: clamp(13px, 3.5vw, 14px);
            margin-top: 10px;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 5px #00cc00, 0 0 8px #00cc00;
            }
            to {
                text-shadow: 0 0 8px #00cc00, 0 0 15px #00cc00;
            }
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 20px;
            background-color: #00cc00;
            animation: blink 1s infinite;
            margin-left: 5px;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #00cc00;
            color: #009900;
            font-size: clamp(11px, 3vw, 12px);
        }
        
        /* スマホ向けの最適化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 0 5px;
            }
            
            .post {
                padding: 12px;
                margin-bottom: 20px;
            }
            
            header {
                margin-bottom: 25px;
                padding-bottom: 15px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            
            .container {
                padding: 0 3px;
            }
            
            .post {
                padding: 10px;
                margin-bottom: 15px;
            }
            
            header {
                margin-bottom: 20px;
                padding-bottom: 12px;
            }
        }
        
        /* タッチデバイス向けの最適化 */
        @media (hover: none) and (pointer: coarse) {
            .post:active {
                background-color: rgba(0, 204, 0, 0.1);
                transform: scale(0.98);
            }
            
            .post h1:active {
                color: #00ff00;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>未知の部屋<span class="cursor"></span></h1>
        </header>
        
        <main>
            <article class="post">
                <h1>
                    <a href="post.html">とあるCDに影響受けて作ったもの</a>
                </h1>
                <div class="post-meta">2026-04-06</div>
                <div class="post-content">
                </div>
            </article>
            
            <article class="post">
                <h1>やったー！</h1>
                <div class="post-meta">2026-04-04</div>
                <div class="post-content">
                    <p>祝！『未知の部屋』開設！</p>
                </div>
            </article>
        </main>
        
        <footer>
            <p>© 2026 未知の部屋</p>
        </footer>
    </div>
</body>
</html>
