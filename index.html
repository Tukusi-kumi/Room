<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未知の部屋</title>
    <style>
        body {
            background-color: #000000;
            color: #00cc00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #00cc00;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            text-shadow: 0 0 8px #00cc00;
            margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .post {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #00cc00;
        }
        
        .post h2 {
            color: #00ff00;
            margin-top: 0;
            font-size: 18px;
            cursor: pointer;
        }
        
        .post h2:hover {
            text-shadow: 0 0 5px #00cc00;
        }
        
        .post-meta {
            font-size: 12px;
            color: #009900;
            margin-bottom: 10px;
        }
        
        .post-content {
            font-size: 14px;
            margin-top: 10px;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 5px #00cc00, 0 0 8px #00cc00;
            }
            to {
                text-shadow: 0 0 8px #00cc00, 0 0 15px #00cc00;
            }
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 20px;
            background-color: #00cc00;
            animation: blink 1s infinite;
            margin-left: 5px;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #00cc00;
            color: #009900;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>レトロブログ<span class="cursor"></span></h1>
        </header>
        
        <main>
            <article class="post">
                <h2>とあるCDに影響受けて作ったもの</h2>
                <div class="post-meta">2026-04-06</div>
                <div class="post-content">
                   
                </div>
            </article>
            
            <article class="post">
                <h2>CSSアニメーションでサイトを生き生きと</h2>
                <div class="post-meta">2026-04-05</div>
                <div class="post-content">
                    <p>CSSのアニメーション機能を使えば、JavaScriptなしでも様々な動きを実現できます。@keyframesとanimationプロパティの基本。</p>
                </div>
            </article>
            
            <article class="post">
                <h2>やったー！</h2>
                <div class="post-meta">2026-04-04</div>
                <div class="post-content">
                    <p>祝！『未知の部屋』開設！</p>
                </div>
            </article>
        </main>
        
        <footer>
            <p>© 2026 レトロブログ</p>
        </footer>
    </div>
    
    <script>
        document.querySelectorAll('.post h2').forEach(title => {
            title.addEventListener('click', function() {
                alert('記事詳細は準備中です...');
            });
        });
    </script>
</body>
</html>
